<!DOCTYPE html>
<html lang="es-mx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visita - Imagenología</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: #f5f7fa;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 2.5rem;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }
        .icon {
            font-size: 3rem;
            color: #0d6efd;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: #1a1a2e;
        }
        p {
            color: #6c757d;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            background: #0d6efd;
            color: #fff;
            text-decoration: none;
            font-family: inherit;
        }
        .btn:hover {
            box-shadow: 0 4px 12px rgba(13,110,253,0.3);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .footer {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #adb5bd;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><i class="bi bi-eye"></i></div>
        <h1>Enlace de visita</h1>
        <p>Se te ha compartido un enlace para ver el sistema de inventario de Imagenología en modo solo lectura.</p>
        <form method="POST" action="{{ action }}">
            {% csrf_token %}
            <button type="submit" class="btn">
                <i class="bi bi-box-arrow-in-right"></i> Entrar como visitante
            </button>
        </form>
        <div class="footer">
            <i class="bi bi-shield-check"></i> Un solo uso &middot; Solo lectura
        </div>
    </div>
</body>
</html>
