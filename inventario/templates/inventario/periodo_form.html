{% extends 'inventario/base.html' %}
{% block title %}Nuevo Periodo - Imagenología{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-calendar-plus"></i> Nuevo Periodo</h4>
            </div>
            <div class="card-body">
                <form method="POST" autocomplete="off">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_fecha_inicio" class="form-label">Fecha inicio</label>
                        <input type="date" name="fecha_inicio" id="id_fecha_inicio"
                               class="form-control" value="{{ inicio|default:'' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_fecha_fin" class="form-label">Fecha fin</label>
                        <input type="date" name="fecha_fin" id="id_fecha_fin"
                               class="form-control" value="{{ fin|default:'' }}" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> Crear periodo
                        </button>
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
